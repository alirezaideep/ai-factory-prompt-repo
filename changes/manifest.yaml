versions:
  - version: "0.1.0"
    date: "2025-02-20"
    type: "minor"
    summary: "Initial repository structure — all modules defined, shared conventions established"
    entry_file: "entries/v0.1.0.md"
    breaking: false

release_plan:
  - version: "0.2.0"
    target_date: "2025-03-15"
    scope: "Command UI + Planning Service — first interactive loop"
  - version: "0.3.0"
    target_date: "2025-04-01"
    scope: "Orchestrator + Agent Runtime — first automated execution"
  - version: "0.4.0"
