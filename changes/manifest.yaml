versioning_rules:
  major: "Breaking API changes, incompatible schema migrations, fundamental architecture shifts"
  minor: "New features, non-breaking API additions, new modules"
  patch: "Bug fixes, documentation updates, minor improvements"
  
  triggers:
    - change: "New feature module added"
      bump: "minor"
    - change: "API endpoint signature changed"
      bump: "major"
    - change: "Database schema migration"
      bump: "minor (if additive) or major (if destructive)"
    - change: "Bug fix in existing feature"
      bump: "patch"
    - change: "Documentation update only"
      bump: "patch"
    - change: "New context pack file"
      bump: "patch"
    - change: "Convention change"
      bump: "minor"
